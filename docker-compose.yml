version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cricket-pose-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./uploads:/app/uploads
    environment:
      - DEVICE=cuda
      - PYTHONUNBUFFERED=1
    networks:
      - cricket-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cricket-pose-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cricket-network
    environment:
      - REACT_APP_API_URL=http://backend:8000

networks:
  cricket-network:
    driver: bridge
